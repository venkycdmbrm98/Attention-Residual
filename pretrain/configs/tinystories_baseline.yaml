model:
  variant: baseline
  n_layers: 14
  d_model: 768
  n_heads: 12
  d_ff: 3072
  max_seq_len: 256
  dropout: 0.0
  mlp_type: swiglu

data:
  train_path: data/tinystories/train.bin
  val_path: data/tinystories/val.bin
  train_meta_path: data/tinystories/train_meta.json
  val_meta_path: data/tinystories/val_meta.json
  seq_len: 256
  train_batch_plan: data/tinystories/plans/train_plan.npy
  val_batch_plan: data/tinystories/plans/val_plan.npy
  val_num_batches: 64

optim:
  optimizer: adamw
  lr: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  max_steps: 60000
  warmup_steps: 1000
  scheduler: cosine

train:
  seed: 1337
  micro_batch_size: 32
  grad_accum_steps: 2
  dtype: bfloat16
  compile: false
  log_interval: 50
  eval_interval: 250
  checkpoint_interval: 5000
  diag_interval: 250
  output_dir: outputs/tinystories_baseline

wandb:
  mode: online
  project: attnres-compare-2
  group: tinystories-14l-768
  name: tinystories-baseline
  tags: [tinystories, baseline, prenorm]

model:
  variant: block_attnres
  n_layers: 8
  d_model: 256
  n_heads: 8
  d_ff: 1024
  max_seq_len: 128
  dropout: 0.0
  mlp_type: swiglu
  attnres_block_size: 2

data:
  train_path: data/delayed_kv/train.bin
  val_path: data/delayed_kv/val.bin
  train_meta_path: data/delayed_kv/train_meta.json
  val_meta_path: data/delayed_kv/val_meta.json
  seq_len: 128
  train_batch_plan: data/delayed_kv/plans/train_plan.npy
  val_batch_plan: data/delayed_kv/plans/val_plan.npy
  val_num_batches: 64

optim:
  optimizer: adamw
  lr: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  max_steps: 10000
  warmup_steps: 500
  scheduler: cosine

train:
  seed: 1337
  micro_batch_size: 32
  grad_accum_steps: 1
  dtype: bfloat16
  compile: false
  log_interval: 10
  eval_interval: 250
  checkpoint_interval: 1000
  diag_interval: 250
  output_dir: outputs/delayed_kv_block_attnres

wandb:
  mode: online
  project: attnres-compare
  group: delayed-kv-8l-256d
  name: delayed-kv-block-attnres
  tags: [delayed-kv, block-attnres, softmax-depth]